{% extends "base.html" %}
{% block title %}Panel Klienta — Logowanie{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 60px auto; padding: 48px; background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.95)); border: 1px solid rgba(139,92,246,0.2); border-radius: 20px; backdrop-filter: blur(20px); box-shadow: 0 25px 50px rgba(0,0,0,0.5);">

    <div style="text-align: center; margin-bottom: 36px;">
        <div style="font-size: 3rem; margin-bottom: 12px;">📊</div>
        <h1 style="font-size: 1.6rem; background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; font-weight: 700;">
            Media Monitoring
        </h1>
        <p style="color: rgba(255,255,255,0.45); font-size: 0.85rem;">Panel klienta — AI Press Agency</p>
    </div>

    {% if error %}
    <div style="background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; color: #fca5a5; font-size: 0.85rem;">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/client/login">
        <div style="margin-bottom: 20px;">
            <label for="username"
                style="display: block; color: rgba(255,255,255,0.55); font-size: 0.8rem; margin-bottom: 6px; font-weight: 500;">Nazwa konta</label>
            <input type="text" id="username" name="username" required autofocus
                style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s;"
                onfocus="this.style.borderColor='rgba(139,92,246,0.5)'; this.style.boxShadow='0 0 0 3px rgba(139,92,246,0.1)'"
                onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.boxShadow='none'"
                placeholder="nazwa firmy">
        </div>

        <div style="margin-bottom: 28px;">
            <label for="password"
                style="display: block; color: rgba(255,255,255,0.55); font-size: 0.8rem; margin-bottom: 6px; font-weight: 500;">Hasło</label>
            <input type="password" id="password" name="password" required
                style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 0.95rem; outline: none; transition: all 0.3s;"
                onfocus="this.style.borderColor='rgba(139,92,246,0.5)'; this.style.boxShadow='0 0 0 3px rgba(139,92,246,0.1)'"
                onblur="this.style.borderColor='rgba(255,255,255,0.1)'; this.style.boxShadow='none'"
                placeholder="••••••••">
        </div>

        <button type="submit"
            style="width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #6366f1); border: none; border-radius: 10px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px;"
            onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 8px 25px rgba(99,102,241,0.4)'"
            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none'">
            Zaloguj się →
        </button>
    </form>

    <div style="text-align: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.06);">
        <p style="color: rgba(255,255,255,0.3); font-size: 0.75rem;">
            © 2026 ImpresjaAI — AI Press Agency
        </p>
    </div>
</div>
{% endblock %}

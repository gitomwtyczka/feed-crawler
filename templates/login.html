{% extends "base.html" %}

{% block title %}Login — Feed Crawler{% endblock %}

{% block content %}
<div
    style="max-width: 420px; margin: 80px auto; padding: 40px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; backdrop-filter: blur(20px);">

    <div style="text-align: center; margin-bottom: 32px;">
        <h1
            style="font-size: 1.8rem; background: linear-gradient(135deg, #a78bfa, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;">
            🔐 Admin Login
        </h1>
        <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Feed Crawler — Panel Administracyjny</p>
    </div>

    {% if error %}
    <div
        style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; color: #fca5a5; font-size: 0.9rem;">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/login">
        <div style="margin-bottom: 20px;">
            <label for="username"
                style="display: block; color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 6px;">Login</label>
            <input type="text" id="username" name="username" required autofocus
                style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='rgba(167,139,250,0.5)'"
                onblur="this.style.borderColor='rgba(255,255,255,0.12)'" placeholder="admin">
        </div>

        <div style="margin-bottom: 28px;">
            <label for="password"
                style="display: block; color: rgba(255,255,255,0.6); font-size: 0.85rem; margin-bottom: 6px;">Hasło</label>
            <input type="password" id="password" name="password" required
                style="width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s;"
                onfocus="this.style.borderColor='rgba(167,139,250,0.5)'"
                onblur="this.style.borderColor='rgba(255,255,255,0.12)'" placeholder="••••••••">
        </div>

        <button type="submit"
            style="width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #6366f1); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.5px;"
            onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
            Zaloguj się →
        </button>
    </form>

    <div style="text-align: center; margin-top: 24px;">
        <a href="/" style="color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none;">
            ← Powrót do czytnika
        </a>
    </div>
</div>
{% endblock %}

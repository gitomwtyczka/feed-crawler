<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Feed Crawler{% endblock %} — AI Press Agency</title>
    <meta name="description" content="AI-powered news aggregation platform — 500+ sources, 35,000+ articles">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(20, 20, 35, 0.8);
            --bg-glass: rgba(30, 30, 50, 0.6);
            --border: rgba(100, 100, 160, 0.15);
            --border-hover: rgba(120, 120, 200, 0.3);
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --text-muted: #555570;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
            --gradient-2: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.5);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Navigation ── */
        .navbar {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 60px;
            gap: 2rem;
        }
        .navbar-brand {
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .navbar-brand span {
            font-weight: 400;
            opacity: 0.7;
        }
        .nav-links {
            display: flex;
            gap: 0.25rem;
            list-style: none;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: var(--accent-glow);
        }
        .nav-search {
            margin-left: auto;
            position: relative;
        }
        .nav-search input {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.4rem 1rem 0.4rem 2.2rem;
            color: var(--text-primary);
            font-size: 0.85rem;
            width: 220px;
            transition: all 0.3s;
            outline: none;
        }
        .nav-search input:focus {
            border-color: var(--accent);
            width: 300px;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .nav-search::before {
            content: '🔍';
            position: absolute;
            left: 0.7rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem;
        }

        /* ── Layout ── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        .page-header {
            margin-bottom: 2rem;
        }
        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .page-header p {
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        /* ── Stats Grid ── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .stat-card:hover::before { opacity: 1; }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 0.25rem;
        }
        .stat-sub {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* ── Tables ── */
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        tr:hover td {
            background: rgba(99, 102, 241, 0.03);
        }
        tr:last-child td { border-bottom: none; }

        /* ── Article List ── */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .article-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .article-item:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: translateY(-1px);
        }
        .article-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            line-height: 1.4;
        }
        .article-title a {
            color: var(--text-primary);
            text-decoration: none;
        }
        .article-title a:hover { color: var(--accent-light); }
        .article-meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .article-summary {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin: 0.5rem 0;
            line-height: 1.5;
        }

        /* ── Badges ── */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .badge-danger { background: rgba(239,68,68,0.15); color: var(--danger); }
        .badge-info { background: var(--accent-glow); color: var(--accent-light); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            font-weight: 500;
            text-decoration: none;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-primary);
            background: transparent;
        }
        .btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .btn-primary {
            background: var(--gradient-1);
            border: none;
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .pagination a, .pagination span {
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .pagination a:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .pagination .active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* ── Grid ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; }

        /* ── Department Tags ── */
        .dept-tag {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            background: var(--accent-glow);
            color: var(--accent-light);
            text-decoration: none;
            transition: all 0.2s;
        }
        .dept-tag:hover {
            background: var(--accent);
            color: white;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
            .navbar-inner { padding: 0 1rem; }
            .nav-search input { width: 150px; }
        }

        /* ── Animations ── */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">Feed Crawler <span>AI</span></a>
            <ul class="nav-links">
                <li><a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>📰 Reader</a></li>
                <li><a href="/admin" {% if "/admin" in request.url.path %}class="active"{% endif %}>⚙️ Admin</a></li>
                <li><a href="/admin/feeds" {% if request.url.path == "/admin/feeds" %}class="active"{% endif %}>📡 Feeds</a></li>
                <li><a href="/api/stats" target="_blank">🔗 API</a></li>
            </ul>
            <form class="nav-search" action="/search" method="get">
                <input type="text" name="q" placeholder="Search articles..." value="{{ q if q is defined else '' }}">
            </form>
        </div>
    </nav>

    <main class="container animate-in">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
